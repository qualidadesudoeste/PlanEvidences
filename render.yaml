# Configuração declarativa do Render — opcional (você pode criar o serviço pelo painel também).
# Os valores marcados com `sync: false` precisam ser configurados manualmente no Dashboard
# do Render por serem secrets (Render não puxa do arquivo nesses casos).
services:
  - type: web
    name: planevidences-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: planevidences
      - key: R2_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
