# Configuração declarativa do Render — opcional.
# Os valores marcados com `sync: false` precisam ser configurados manualmente
# no Dashboard do Render por serem secrets.
services:
  - type: web
    name: planevidences-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: us-east-1
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: planevidences
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
